<!DOCTYPE html>

<html lang="tr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Note Editor Modal</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Nunito+Sans:wght@400;600&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2665ed",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "sora": ["Sora", "sans-serif"],
                        "nunito": ["Nunito Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<!-- Modal Backdrop -->
<div class="fixed inset-0 bg-slate-900/50 dark:bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
<!-- Modal Container -->
<div class="bg-white dark:bg-slate-800 rounded-lg shadow-xl w-full max-w-2xl flex flex-col overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between px-6 py-4 border-b border-slate-200 dark:border-slate-700">
<h3 class="font-sora text-xl font-bold text-slate-900 dark:text-white">Yeni Not</h3>
<button class="text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200 transition-colors rounded-full p-1 hover:bg-slate-100 dark:hover:bg-slate-700">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Content -->
<div class="p-6 flex flex-col gap-5">
<!-- Title Input -->
<div class="flex flex-col gap-2">
<label class="font-sora text-sm font-semibold text-slate-700 dark:text-slate-300" for="note-title">Başlık</label>
<input class="font-nunito w-full rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow placeholder:text-slate-400 dark:placeholder:text-slate-500" id="note-title" placeholder="Not başlığını girin..." type="text" value=""/>
</div>
<!-- Note Body Textarea -->
<div class="flex flex-col gap-2">
<label class="font-sora text-sm font-semibold text-slate-700 dark:text-slate-300" for="note-body">Notunuz</label>
<textarea class="font-nunito w-full min-h-[240px] resize-y rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 px-4 py-3 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none transition-shadow placeholder:text-slate-400 dark:placeholder:text-slate-500" id="note-body" placeholder="Notunuzu buraya yazın..."></textarea>
</div>
</div>
<!-- Footer / Actions -->
<div class="px-6 py-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-end gap-3 rounded-b-lg">
<button class="font-sora px-5 py-2.5 rounded-lg text-sm font-semibold text-slate-700 dark:text-slate-300 bg-slate-200 hover:bg-slate-300 dark:bg-slate-700 dark:hover:bg-slate-600 transition-colors">
                    İptal
                </button>
<button class="font-sora px-5 py-2.5 rounded-lg text-sm font-semibold text-white bg-primary hover:bg-blue-700 transition-colors shadow-sm">
                    Kaydet
                </button>
</div>
</div>
</div>
</body></html>
