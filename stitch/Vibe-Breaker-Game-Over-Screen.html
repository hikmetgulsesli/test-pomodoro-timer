<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vibe-Breaker Game Over</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e9445f",
                        "background-light": "#f8f6f6",
                        "background-dark": "#1a1525", // Dark navy/purple adjusted for primary harmony
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Glitch effect simulation using text-shadow */
        .glitch-text {
            text-shadow: 
                2px 0 0 rgba(0, 255, 255, 0.7),
                -2px 0 0 rgba(255, 0, 255, 0.7);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen">
<div class="relative flex h-screen w-full flex-col group/design-root overflow-hidden">
<!-- Blurred Gameplay Background -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center blur-md opacity-40 scale-105" data-alt="Retro neon grid arcade gameplay screenshot" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC63jrz-i_q8jkG1jyYvMG6bhPys4kPPB2w5KTsGRsmRviMCle1N1APKzzvr3_t_INK5KdvLJ_9VQJEVTIADkv8nxlqUgPs56QOUwtUrtZ_tH_gPGecLbJxoS2idwIUHhsNrbMWXDOYVf0OR-bQ2LgFAdhlg7Sh2bLmZLu0v10cp2deFP1j43m2yAdwzEX1xo7cIs27_5jEVvrJQahQ1l9xAlCJV4CHTxyOIbkwHlm8R-fqtkRFcJIqya3kXuJz3ye62wh_XGZYChMR');"></div>
<!-- Dark Navy Overlay -->
<div class="absolute inset-0 bg-[#0b0c10]/80 mix-blend-multiply"></div>
</div>
<div class="layout-container flex h-full grow flex-col relative z-10">
<!-- Header -->
<header class="flex items-center justify-between whitespace-nowrap px-10 py-6 border-b border-white/10">
<div class="flex items-center gap-4 text-slate-900 dark:text-slate-100">
<div class="size-6 text-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[32px]">sports_esports</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-widest uppercase">Vibe-Breaker</h2>
</div>
</header>
<!-- Main Content -->
<div class="flex flex-1 items-center justify-center px-4 py-12">
<div class="flex flex-col items-center gap-10 max-w-3xl w-full p-12 bg-black/40 backdrop-blur-sm rounded-2xl border border-white/5 shadow-2xl">
<!-- Glitch Title -->
<div class="text-center">
<h1 class="text-primary text-6xl md:text-8xl font-bold leading-tight tracking-[0.05em] glitch-text uppercase mb-2">
                            GAME OVER
                        </h1>
</div>
<!-- Scores -->
<div class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12 w-full mt-4">
<div class="flex flex-col items-center bg-white/5 p-6 rounded-xl border border-white/10 min-w-[200px]">
<p class="text-slate-400 dark:text-slate-400 text-sm font-bold uppercase tracking-widest mb-2">Final Score</p>
<p class="text-slate-900 dark:text-slate-100 text-3xl font-display font-bold tracking-[0.1em]">004250</p>
</div>
<div class="flex flex-col items-center bg-primary/10 p-6 rounded-xl border border-primary/20 min-w-[200px]">
<p class="text-primary text-sm font-bold uppercase tracking-widest mb-2 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">trophy</span>
                                High Score
                            </p>
<p class="text-primary text-3xl font-display font-bold tracking-[0.1em] drop-shadow-[0_0_8px_rgba(233,68,95,0.5)]">008400</p>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col items-center gap-4 mt-8 w-full">
<button class="group relative flex w-full max-w-[320px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-16 px-8 bg-primary hover:bg-primary/90 text-white transition-all shadow-[0_0_20px_rgba(233,68,95,0.4)] hover:shadow-[0_0_30px_rgba(233,68,95,0.6)] border-2 border-primary">
<span class="absolute inset-0 w-full h-full bg-gradient-to-t from-black/20 to-transparent"></span>
<div class="flex items-center gap-3 relative z-10 text-xl font-bold uppercase tracking-widest">
<span class="material-symbols-outlined">replay</span>
<span>Restart</span>
</div>
</button>
<button class="flex items-center justify-center gap-2 px-6 py-3 text-slate-400 hover:text-slate-100 transition-colors uppercase tracking-wider text-sm font-bold mt-2">
<span class="material-symbols-outlined text-[20px]">menu</span>
                            Return to Main Menu
                        </button>
</div>
</div>
</div>
<!-- Footer subtle detail -->
<div class="pb-6 text-center">
<p class="text-slate-500 text-xs tracking-[0.2em] uppercase">Insert Coin To Continue</p>
</div>
</div>
</div>
</body></html>
