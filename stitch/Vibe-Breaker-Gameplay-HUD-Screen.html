<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vibe-Breaker Gameplay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#f43325",
              "background-light": "#f8f6f5",
              "background-dark": "#221110",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"],
              "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "Liberation Mono", "Courier New", "monospace"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="relative flex h-screen w-full flex-col group/design-root overflow-hidden">
<!-- Parallax Background Layers (Simulated with CSS) -->
<div class="absolute inset-0 z-0 bg-gradient-to-b from-[#0a0a2a] to-[#1a1a4a] dark:from-[#050515] dark:to-[#0f0f2f]"></div>
<!-- Distant Mountains Layer -->
<div class="absolute bottom-0 left-0 w-[200%] h-1/2 z-10 opacity-30 flex items-end">
<svg class="w-full h-full text-[#151535] dark:text-[#0a0a1a]" fill="currentColor" preserveaspectratio="none" viewbox="0 0 1000 200">
<path d="M0,200 L0,150 L50,120 L100,160 L200,80 L300,140 L400,60 L500,100 L600,40 L700,90 L800,20 L900,70 L1000,10 L1000,200 Z"></path>
</svg>
</div>
<!-- Midground Buildings Layer -->
<div class="absolute bottom-0 left-0 w-[200%] h-1/3 z-20 opacity-50 flex items-end">
<svg class="w-full h-full text-[#202045] dark:text-[#101025]" fill="currentColor" preserveaspectratio="none" viewbox="0 0 1000 150">
<path d="M0,150 L0,100 L40,100 L40,80 L80,80 L80,110 L120,110 L120,60 L180,60 L180,90 L220,90 L220,50 L280,50 L280,100 L320,100 L320,70 L380,70 L380,120 L420,120 L420,40 L480,40 L480,90 L520,90 L520,30 L580,30 L580,100 L620,100 L620,60 L680,60 L680,110 L720,110 L720,20 L780,20 L780,80 L820,80 L820,50 L880,50 L880,100 L920,100 L920,40 L980,40 L980,150 Z"></path>
</svg>
</div>
<!-- Foreground Ground Line -->
<div class="absolute bottom-[20%] left-0 w-full h-[2px] bg-primary z-30 shadow-[0_0_10px_theme(colors.primary)]"></div>
<div class="layout-container flex h-full grow flex-col relative z-40">
<!-- HUD -->
<header class="flex items-start justify-between whitespace-nowrap px-8 py-6 w-full">
<div class="flex flex-col gap-1">
<div class="text-white/70 dark:text-slate-400 text-sm font-mono tracking-widest uppercase">High Score</div>
<div class="text-white dark:text-slate-100 text-2xl font-mono font-bold tracking-wider">008400</div>
</div>
<div class="flex flex-col items-end gap-1">
<div class="text-primary text-sm font-mono tracking-widest uppercase font-bold">Score</div>
<div class="text-white dark:text-slate-100 text-3xl font-mono font-bold tracking-wider">001250</div>
</div>
</header>
<!-- Gameplay Area -->
<div class="flex-1 relative w-full h-full">
<!-- Player Character -->
<div class="absolute left-[15%] bottom-[20%] w-12 h-12 bg-primary rounded-sm shadow-[0_0_15px_theme(colors.primary)] animate-pulse" style="transform: translateY(-2px);">
<!-- Simple runner eye/detail -->
<div class="absolute right-2 top-2 w-2 h-2 bg-white rounded-full"></div>
</div>
<!-- Obstacles -->
<div class="absolute right-[30%] bottom-[20%] w-8 h-20 bg-purple-600 rounded-t-sm border border-purple-400 shadow-[0_0_10px_rgba(147,51,234,0.5)]"></div>
<div class="absolute right-[10%] bottom-[20%] w-10 h-12 bg-purple-600 rounded-t-sm border border-purple-400 shadow-[0_0_10px_rgba(147,51,234,0.5)]"></div>
<!-- Floating Collectible -->
<div class="absolute right-[45%] bottom-[40%] w-6 h-6 bg-yellow-400 rounded-full border border-yellow-200 shadow-[0_0_15px_rgba(250,204,21,0.8)] rotate-45"></div>
</div>
<!-- Controls Hint -->
<div class="absolute bottom-6 left-0 right-0 flex justify-center opacity-50">
<div class="text-white dark:text-slate-300 text-xs font-mono flex items-center gap-2">
<span class="material-symbols-outlined text-sm">keyboard_arrow_up</span> JUMP
                     <span class="mx-4 text-primary/50">|</span>
<span class="material-symbols-outlined text-sm">keyboard_arrow_down</span> DUCK
                 </div>
</div>
</div>
</div>
</body></html>
